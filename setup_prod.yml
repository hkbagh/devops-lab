---- name: Deploy Custom Python App V2 with Persistence  hosts: webservers  become: yes  tasks:    - name: Ensure Docker is installed      apt:        name: docker.io        state: present    - name: Ensure the Data Folder exists on the VPS      file:        path: /home/ubuntu/app_data        state: directory        owner: root        group: root        mode: '0777' # Give full read/write access so Docker can use it    - name: Clean up ALL existing containers      shell: "docker rm -f $(docker ps -aq) || true"    - name: Upload the App V2 "Cartridge"      copy:        src: my-app-v3.tar        dest: /tmp/my-app-v3.tar    - name: Load the V2 Image      shell: "docker load < /tmp/my-app-v3.tar"    - name: Start V2 App with a Volume Mount      shell: "docker run -d -p 80:5000 -v /home/ubuntu/app_data:/app/data --name my-python-app my-custom-app:v3"